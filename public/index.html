<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <!-- You can link your styles.css to style this login page -->
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

  <h2>Please Log In</h2>
  <form id="login-form">
    <label for="password">Password:</label>
    <input type="password" id="password" required>
    <button type="submit">Unlock</button>
  </form>
  <p id="message"></p>

  <!-- This JS controls the login logic -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const loginForm = document.getElementById('login-form');
      const messageEl = document.getElementById('message');

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault(); 
        const password = document.getElementById('password').value;
        messageEl.textContent = 'Checking...';

        try {
          const response = await fetch('/.netlify/functions/check-pass', {
            method: 'POST',
            body: JSON.stringify({ password: password }),
          });

          if (response.ok) {
            messageEl.textContent = 'Success! Redirecting...';
            // If correct, send to secret.html
            window.location.href = '/secret.html';
          } else {
            messageEl.textContent = 'Wrong password. Try again.';
          }
        } catch (err) {
          messageEl.textContent = 'An error occurred.';
        }
      });
    });
  </script>
</body>
</html>
